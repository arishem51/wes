services:
  postgres:
    image: postgres:16
    container_name: wes-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wes
    ports:
      - '5432:5432'
    volumes:
      - wes_pgdata:/var/lib/postgresql/data
      # Auto-apply schema on first boot of an empty volume.
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  mqtt:
    image: eclipse-mosquitto:2
    container_name: aubot-mqtt
    ports:
      - '1883:1883'
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

volumes:
  wes_pgdata:
